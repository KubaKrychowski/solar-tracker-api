<svg viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: system-ui, -apple-system, sans-serif;">
  <title>MockController Architecture — STM32 Simulator</title>
  <desc>Worker Service with 6 services publishing telemetry to MQTT broker</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888" />
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="white" rx="0"/>

  <!-- Worker Service container -->
  <rect x="20" y="20" width="480" height="480" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="40" y="50" font-size="14" font-weight="600" fill="#212529">Worker Service</text>
  <text x="40" y="68" font-size="11" fill="#6c757d">BackgroundService — loop every 100ms</text>

  <!-- Worker box -->
  <rect x="160" y="85" width="200" height="44" rx="6" fill="#6366f1" />
  <text x="260" y="112" font-size="13" font-weight="600" fill="white" text-anchor="middle">Worker.cs</text>

  <!-- Tick arrow -->
  <line x1="260" y1="129" x2="260" y2="155" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)" />
  <text x="275" y="147" font-size="9" fill="#6c757d">Tick()</text>

  <!-- TrackerSimulator -->
  <rect x="160" y="158" width="200" height="52" rx="6" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="260" y="180" font-size="12" font-weight="600" fill="#212529" text-anchor="middle">TrackerSimulator</text>
  <text x="260" y="198" font-size="10" fill="#6c757d" text-anchor="middle">SPA + LDR + servo + 3 modes</text>

  <!-- SolarPositionService -->
  <rect x="40" y="162" width="105" height="44" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="92" y="182" font-size="10" font-weight="500" fill="#212529" text-anchor="middle">SolarPosition</text>
  <text x="92" y="196" font-size="9" fill="#6c757d" text-anchor="middle">SPA formula</text>
  <line x1="145" y1="184" x2="157" y2="184" stroke="#dee2e6" stroke-width="1" marker-end="url(#arrow)" />

  <!-- SensorSimulator -->
  <rect x="40" y="240" width="130" height="44" rx="6" fill="white" stroke="#dee2e6" stroke-width="1.2"/>
  <text x="105" y="259" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">SensorSimulator</text>
  <text x="105" y="275" font-size="9" fill="#6c757d" text-anchor="middle">V, A, W, °C, LDR</text>

  <!-- WindSimulator -->
  <rect x="185" y="240" width="130" height="44" rx="6" fill="white" stroke="#dee2e6" stroke-width="1.2"/>
  <text x="250" y="259" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">WindSimulator</text>
  <text x="250" y="275" font-size="9" fill="#6c757d" text-anchor="middle">speed + gusts + dir</text>

  <!-- UpsSimulator -->
  <rect x="330" y="240" width="130" height="44" rx="6" fill="white" stroke="#dee2e6" stroke-width="1.2"/>
  <text x="395" y="259" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">UpsSimulator</text>
  <text x="395" y="275" font-size="9" fill="#6c757d" text-anchor="middle">battery, ATS, source</text>

  <!-- AlarmService -->
  <rect x="120" y="310" width="280" height="44" rx="6" fill="white" stroke="#ef4444" stroke-width="1.2"/>
  <text x="260" y="329" font-size="11" font-weight="500" fill="#212529" text-anchor="middle">AlarmService</text>
  <text x="260" y="345" font-size="9" fill="#6c757d" text-anchor="middle">wind &gt; 15 m/s | temp &gt; 80°C | UPS &lt; 20% + hysteresis</text>

  <!-- Arrows from simulators to AlarmService -->
  <line x1="105" y1="284" x2="200" y2="307" stroke="#dee2e6" stroke-width="1" marker-end="url(#arrow)" />
  <line x1="250" y1="284" x2="260" y2="307" stroke="#dee2e6" stroke-width="1" marker-end="url(#arrow)" />
  <line x1="395" y1="284" x2="330" y2="307" stroke="#dee2e6" stroke-width="1" marker-end="url(#arrow)" />

  <!-- MqttPublisher -->
  <rect x="120" y="385" width="280" height="52" rx="6" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="260" y="407" font-size="12" font-weight="600" fill="#212529" text-anchor="middle">MqttPublisher</text>
  <text x="260" y="424" font-size="10" fill="#6c757d" text-anchor="middle">LWT + reconnect + JSON camelCase</text>

  <!-- Arrow from AlarmService to MqttPublisher -->
  <line x1="260" y1="354" x2="260" y2="382" stroke="#ef4444" stroke-width="1" marker-end="url(#arrow)" />

  <!-- Arrows from simulators to MqttPublisher -->
  <path d="M105,284 L105,400 L117,400" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)" />
  <path d="M395,284 L395,400 L403,400" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)" />

  <!-- MQTT Broker -->
  <rect x="550" y="200" width="150" height="160" rx="12" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="625" y="235" font-size="14" font-weight="600" fill="#6366f1" text-anchor="middle">Mosquitto</text>
  <text x="625" y="253" font-size="10" fill="#6c757d" text-anchor="middle">MQTT Broker :1883</text>

  <!-- Topics list -->
  <text x="565" y="278" font-size="9" fill="#6c757d" font-family="monospace">status    → 1s</text>
  <text x="565" y="294" font-size="9" fill="#6c757d" font-family="monospace">sensors   → 5s</text>
  <text x="565" y="310" font-size="9" fill="#6c757d" font-family="monospace">wind      → 2s</text>
  <text x="565" y="326" font-size="9" fill="#6c757d" font-family="monospace">ups       → 5s</text>
  <text x="565" y="342" font-size="9" fill="#6c757d" font-family="monospace">alarm     → event</text>

  <!-- Arrow MqttPublisher to Broker (publish) -->
  <line x1="400" y1="405" x2="547" y2="300" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow-accent)" />
  <text x="480" y="340" font-size="10" font-weight="500" fill="#6366f1" transform="rotate(-20, 480, 340)">PUBLISH</text>

  <!-- Arrow Broker to MqttPublisher (commands) -->
  <line x1="547" y1="330" x2="400" y2="420" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrow)" stroke-dasharray="6,3" />
  <text x="480" y="390" font-size="10" font-weight="500" fill="#ef4444" transform="rotate(-20, 480, 390)">command/#</text>

  <!-- Thread safety box -->
  <rect x="530" y="400" width="180" height="95" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="620" y="420" font-size="11" font-weight="600" fill="#212529" text-anchor="middle">Thread safety</text>
  <text x="545" y="438" font-size="9" fill="#6c757d">Worker loop     → Tick, Generate</text>
  <text x="545" y="454" font-size="9" fill="#6c757d">MQTT callback → SetTarget, SetMode</text>
  <text x="545" y="470" font-size="9" fill="#6c757d">TrackerSimulator → lock(_lock)</text>
  <text x="545" y="486" font-size="9" fill="#6c757d">Reconnect       → exp. backoff</text>
</svg>
